<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: capture the original path and redirect to base
      (function() {
        const path = window.location.pathname;
        
        // Store the intended route in sessionStorage (preserve the full path)
        sessionStorage.setItem('githubPagesRedirect', path);
        
        // Redirect to the root
        window.location.replace('/');
      })();
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
